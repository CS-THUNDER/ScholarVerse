<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | ScholarVerse</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="../css/variables.css">

    <link rel="stylesheet" href="../css/main.css">

    <link rel="stylesheet" href="../css/background.css">

    <link rel="stylesheet" href="../css/auth.css">

</head>

<body>

    <div class="auth-container">

        <!-- ================= LEFT ================= -->

        <section class="auth-left">

            <a href="../index.html" class="auth-logo">

                Scholar<span>Verse</span>

            </a>

            <div class="left-content">

                <span class="left-badge">
                    ✨ Student First Platform
                </span>

                <h1>

                    Study.
                    <br>

                    Compete.
                    <br>

                    <span>Grow.</span>

                </h1>

                <p>

                    Everything a student needs in one platform.

                </p>

            </div>

            <div class="feature-card">

                <div class="feature-icon">

                    <i data-lucide="brain"></i>

                </div>

                <div>

                    <h3>Smart Study Planner</h3>

                    <p>

                        AI builds your study schedule
                        automatically.

                    </p>

                </div>

            </div>

            <div class="slider-dots">

                <span class="dot active"></span>

                <span class="dot"></span>

                <span class="dot"></span>

                <span class="dot"></span>

            </div>

        </section>

        <!-- ================= RIGHT ================= -->

        <section class="auth-right">

            <div class="login-card">

                <h2>

                    Welcome Back 👋

                </h2>

                <p>

                    Continue your learning journey.

                </p>

                <form class="login-form" id="loginForm">

                    <div class="input-group">

                        <label>Email</label>

                        <div class="input-box">

                            <i data-lucide="mail"></i>

                            <input type="email" id="email" placeholder="Enter your email" required>

                        </div>

                    </div>

                    <div class="input-group">
                    
                        <label for="password">Password</label>
                    
                        <div class="input-box">
                    
                            <i data-lucide="lock"></i>
                    
                            <input type="password" id="password" placeholder="Enter your password" required>
                    
                            <button type="button" class="password-toggle" id="togglePassword" aria-label="Show Password">
                    
                                <i data-lucide="eye"></i>
                    
                            </button>
                    
                        </div>
                    
                    </div>

                    <div class="form-options">

                        <label>

                            <input type="checkbox">

                            Remember Me

                        </label>

                        <a href="forgot-password.html">

                            Forgot Password?

                        </a>

                    </div>

                    <div id="message"></div>

                    <button type="submit" class="login-btn">
                    
                        <span>Login</span>
                    
                    </button>

                </form>

                <div class="divider">

                    OR

                </div>

                <p class="register-link">

                    Don't have an account?

                    <a href="register.html">

                        Create Account

                    </a>

                </p>

            </div>

        </section>

    </div>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script>

        lucide.createIcons();

    </script>

    <script src="../js/auth.js"></script>
    <script src="../js/auth/login.js"></script>

</body>

</html>
