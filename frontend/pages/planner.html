<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Planner | ScholarVerse</title>

    <!-- Base -->
    <link rel="stylesheet" href="../css/base/base-variables.css">
    <link rel="stylesheet" href="../css/base/base-reset.css">
    <link rel="stylesheet" href="../css/base/base-typography.css">
    <link rel="stylesheet" href="../css/base/base-utilities.css">
    <link rel="stylesheet" href="../css/base/base-animations.css">
    
    <!-- Layout -->
    <link rel="stylesheet" href="../css/layout/dashboard-layout.css">
    <link rel="stylesheet" href="../css/layout/sidebar.css">
    <link rel="stylesheet" href="../css/layout/navbar.css">
    
    <!-- Components -->
    <link rel="stylesheet" href="../css/components/cards.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/components/forms.css">
    <link rel="stylesheet" href="../css/components/modal.css">
    <link rel="stylesheet" href="../css/components/toast.css">
    
    <!-- Pages -->
    <link rel="stylesheet" href="../css/pages/planner.css">

    <!-- responsive -->
    <link rel="stylesheet" href="../css/responsive/responsive-planner.css">

    <!-- Effects -->
    <link rel="stylesheet" href="../css/background.css">

</head>

<body>

    <div class="dashboard-layout">

        <!-- Sidebar -->
        <div id="sidebar"></div>

        <!-- Main Content -->
        <main class="dashboard-main">

            <!-- Navbar -->
            <div id="navbar"></div>

            <!-- Planner Header -->
            <section class="planner-header">

                <div>

                    <h1>📅 Study Planner</h1>

                    <p>
                        Organize your study schedule and stay productive.
                    </p>

                </div>

                <button id="addTaskBtn" class="primary-btn">

                    + Add Task

                </button>

            </section>

            <section class="planner-stats">
            
                <div class="planner-stat-card">
                    <h2 id="totalTasksStat">0</h2>
                    <span>Total Tasks</span>
                </div>
            
                <div class="planner-stat-card">
                    <h2 id="pendingTasksStat">0</h2>
                    <span>Pending</span>
                </div>
            
                <div class="planner-stat-card">
                    <h2 id="completedTasksStat">0</h2>
                    <span>Completed</span>
                </div>
            
                <div class="planner-stat-card">
                    <h2 id="progressTasksStat">0%</h2>
                    <span>Progress</span>
                </div>
            
            </section>

            <section class="planner-toolbar">
            
                <input type="text" id="searchTask" placeholder="🔍 Search tasks...">
            
                <select id="filterTask">
            
                    <option value="all">All Tasks</option>
            
                    <option value="pending">Pending</option>
            
                    <option value="completed">Completed</option>
            
                </select>
            
                <select id="sortTask">
            
                    <option value="dueDate">Due Date</option>
            
                    <option value="priority">Priority</option>
            
                    <option value="newest">Newest</option>
            
                </select>
            
            </section>

            <!-- Task List -->

            <section id="taskContainer" class="task-grid">

            </section>

        </main>

    </div>

    <!-- ===============================
            TASK MODAL
    ================================ -->

    <div class="modal-overlay" id="taskModal">

        <div class="task-modal">

            <h2 id="modalTitle">

                Create Study Task

            </h2>

            <form id="taskForm">

                <!-- Hidden Task ID -->
                <input type="hidden" id="taskId">

                <div class="form-group">

                    <label for="taskTitle">

                        Task Title

                    </label>

                    <input type="text" id="taskTitle" placeholder="Complete DBMS Assignment" required>

                </div>

                <div class="form-group">

                    <label for="taskDescription">

                        Description

                    </label>

                    <textarea id="taskDescription" rows="4" placeholder="Optional"></textarea>

                </div>

                <div class="form-group">

                    <label for="taskDueDate">

                        Due Date

                    </label>

                    <input type="date" id="taskDueDate" required>

                </div>

                <div class="form-group">

                    <label for="taskPriority">

                        Priority

                    </label>

                    <select id="taskPriority">

                        <option value="Low">

                            Low

                        </option>

                        <option value="Medium" selected>

                            Medium

                        </option>

                        <option value="High">

                            High

                        </option>

                    </select>

                </div>

                <div class="modal-buttons">

                    <button type="button" id="closeModal" class="secondary-btn">

                        Cancel

                    </button>

                    <button type="submit" id="submitTaskBtn" class="primary-btn">

                        Create Task

                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- =====================================
            DELETE CONFIRM MODAL
    ===================================== -->
    
    <div class="modal-overlay" id="deleteModal">
    
        <div class="task-modal delete-modal">
    
            <h2>🗑 Delete Task</h2>
    
            <p>
    
                Are you sure you want to delete this task?
    
                <br><br>
    
                <strong>This action cannot be undone.</strong>
    
            </p>
    
            <div class="modal-buttons">
    
                <button id="cancelDelete" class="secondary-btn">
    
                    Cancel
    
                </button>
    
                <button id="confirmDelete" class="danger-btn">
    
                    Delete
    
                </button>
    
            </div>
    
        </div>
    
    </div>

    <!-- Scripts -->

    <script src="../js/api/api.js"></script>

    <script src="../js/utils/auth.js"></script>

    <script src="../js/components/sidebar.js"></script>

    <script src="../js/components/navbar.js"></script>

    <script src="../js/components/toast.js"></script>

    <script src="../js/planner/planner.js"></script>

    <div class="toast-container" id="toastContainer"></div>

</body>

</html>
